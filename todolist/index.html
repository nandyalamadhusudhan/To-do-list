<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list app</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'poppins',sans-serif;
            box-sizing:border-box;
        }
        .container{
            width:100%;
            min-height: 100vh;
            background: linear-gradient(135deg,#153677,#4e085f);
            padding:10px;
        }
        .todoapp{
            width:100%;
            max-width: 540px;
            background: #fff;
            margin:100px auto 20px;
            padding:40px 30px 70px;
            border-radius:20px;
        }
        .todoapp h2{
            display: flex;
            align-items: center;
            gap:10px;
            margin-bottom: 20px;
        }
        .row{
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #edeef0;
            padding-left: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        input{
            flex: 1;
            border: none;
            outline: none;
            background:transparent;
            padding: 10px;
            font-size: 14px;
            height:40px;
            line-height: 40px;
            text-align: center;
        }
        .a{
            border: none;
            outline: none;
            padding:16px 30px;
            border-radius: 40px;
            background-color: orangered;
            right: 525px;
            cursor:pointer;
        }
        ul li{
            list-style: none;
            padding:10px 50px;
            user-select: none;
            font-size: 20px;
            cursor:pointer;
            position: relative;
        }
        ul li::before {
        content: '';
        position: absolute;
        left: 10px;
        top:50%;
        transform:translateY(-50%);
        height: 28px;
        width: 28px;   
        background-image: url("unchecked.png");
        background-size: cover;
        background-position: center;
}
ul li.checked{
    text-decoration: line-through;
}

ul li.checked::before {
    background-image: url("checked.png");
    
}
ul li span{
    position: absolute;
    right:0;
    top:5px;
    width:40px;
    height:40px;
    line-height: 40px;
    border-radius: 50%;
    text-align: center;
}
ul li span:hover{
    background-color: #edeef0;
}
.b{
    display: flex;
    align-items: center;
    gap:10px;
}
.c{
    border:none;
    outline:none;
    
}
    </style>
</head>
<body>
    <div class="container">
        <div class="todoapp">
            <h2>To-Do List<img src="notes.png" alt="notes" width="30" height="30"></h2>
        <div class="row">
            <input type="text" id="enteredtext" placeholder="enter your text">
            <button class="a" type="button">Add</button>
        </div>
        <ul id="result">   
        </ul>
        </div>   
    </div>
    <script>
        const inputbox=document.getElementById("enteredtext");
        const addbtn=document.querySelector("button");
        const result=document.getElementById("result");
        const box=[];
        addbtn.addEventListener("click",addtask);
        function addtask(){
            let task=inputbox.value.trim();
            if(task===""){
                alert("enter the task");
                return;
            }
            else{
                let li=document.createElement("li");
                li.innerHTML=inputbox.value;
                result.appendChild(li);
                let span=document.createElement("span");
                span.innerHTML="\u00d7";
                li.appendChild(span);
            }
            inputbox.value="";  
            save();
        }   
        document.addEventListener("click",function(e){
            if(e.target.tagName==="LI"){
                e.target.classList.toggle("checked");
                save();
            }
            else if(e.target.tagName==="SPAN"){
                e.target.parentElement.remove();
                save();
            }
        });  
        function save(){
            localStorage.setItem("data",result.innerHTML);
        }
        function show(){
            result.innerHTML=localStorage.getItem("data");
        }
        show();
    </script>   
</body>
</html>
